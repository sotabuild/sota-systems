    <title>SOTA Systems for Hotelary</title>
    <script>
        // GitHub Pages 404 redirect for SPA routing
        // This script redirects all 404s to the index.html with the original path preserved

        sessionStorage.redirect = path;
        window.location.href = '/sota-systems/';
    </script>
</head>
